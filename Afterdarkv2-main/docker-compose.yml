version: '3.7'
services:
    nginx:
        image: nginx:1.21.6-alpine
        container_name: ${APP_NAME}-nginx
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:delegated
            - ./docker/development/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./docker/development/nginx/nginx.conf:/etc/nginx/nginx.conf
        links:
            - app
        depends_on:
            - app
            - database
        ports:
            - '80:80'
        networks:
            - erocast-vue

    app:
        container_name: ${APP_NAME}-php
        build:
            args:
                user: ${APP_NAME}
                uid: 1000
            context: docker/development/php
            dockerfile: php.docker
        environment:
            APP_NAME: ${APP_NAME}
        volumes:
            - ./docker/development/php/php.ini:/usr/local/etc/php/conf.d/php.ini
            - ./:/var/www/html
        working_dir: /var/www/html
        ports:
            - '9001:9001'
            - '${REVERB_PORT}:8080'
        links:
            - database
        depends_on:
            - database
        networks:
            - erocast-vue

    redis:
        image: redis:6.2.6-alpine
        container_name: ${APP_NAME}-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        networks:
            - erocast-vue

    database:
        image: mysql:8.0
        container_name: ${APP_NAME}-database
        ports:
            - "3306:3306"
        command: --default-authentication-plugin=mysql_native_password --sql_mode=''
        restart: unless-stopped
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            UPLOAD_LIMIT: 400M
            MAX_EXECUTION_TIME: 3600
        networks:
            - erocast-vue

volumes:
    database:
        driver: local
networks:
    erocast-vue:
        driver: bridge
